<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAN Educare | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Animations */
        .fade-out {
            animation: fadeOut 1.5s forwards;
            animation-delay: 2s; 
        }
        
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s forwards;
            animation-delay: 3s; /* Triggers after old logo fades */
        }

        .delay-show {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
            animation-delay: 4.5s;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); display: none; }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col items-center justify-center overflow-hidden font-sans">

    <div class="relative flex flex-col items-center justify-center w-full max-w-lg text-center px-4">
        
        <div class="absolute inset-0 flex items-center justify-center fade-out">
            <img src="san_old.png" alt="Old SAN Educare Logo" class="h-32 object-contain drop-shadow-lg">
        </div>

        <div class="fade-in-up w-full">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-2">
                <span class="text-white">SAN</span> <span class="text-blue-500">Educare</span>
            </h1>
            <p class="text-sm md:text-base text-gray-400 font-medium tracking-widest uppercase mb-8">
                A SAN Technologies Company
            </p>
        </div>

        <div class="delay-show w-full max-w-md mx-auto">
            <p class="text-gray-300 mb-6 text-lg">The future of learning is loading. Be the first to know.</p>
            <form class="flex flex-col sm:flex-row gap-3">
                <input type="email" placeholder="Enter your email" required
                    class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-blue-500 transition-colors">
                <button type="submit" 
                    class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors whitespace-nowrap">
                    Notify Me
                </button>
            </form>
        </div>

    </div>

</body>
</html>
